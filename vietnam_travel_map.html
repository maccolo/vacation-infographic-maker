<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ベトナム中部 北上旅行プラン【3泊4日】</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP','Meiryo',sans-serif;
  background: #fdf6ec;
  color: #2e1f0e;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #b03a18 0%, #e06b2a 60%, #f0a030 100%);
  color: #fff;
  text-align: center;
  padding: 22px 16px 18px;
  box-shadow: 0 3px 14px rgba(0,0,0,.3);
}
.header h1 { font-size: 1.45em; font-weight: 800; letter-spacing: .06em; text-shadow: 1px 2px 4px rgba(0,0,0,.35); }
.header p  { font-size: .82em; margin-top: 6px; opacity: .92; letter-spacing: .04em; }

/* ── LAYOUT ── */
.main {
  display: flex;
  gap: 0;
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 16px;
  align-items: flex-start;
}

/* ── LEFT: MAP ── */
.map-col {
  width: 300px;
  flex-shrink: 0;
  position: sticky;
  top: 20px;
}
.map-col h2 {
  text-align: center;
  font-size: .82em;
  color: #b03a18;
  margin-bottom: 8px;
  letter-spacing: .06em;
  font-weight: 700;
}
.map-wrap {
  background: #e8f4f8;
  border-radius: 14px;
  border: 2px solid #d0895a;
  box-shadow: 0 4px 18px rgba(0,0,0,.15);
  overflow: hidden;
}

/* ── RIGHT: TIMELINE ── */
.timeline-col {
  flex: 1;
  padding-left: 24px;
}
.tl-title {
  font-size: 1.1em;
  font-weight: 800;
  color: #b03a18;
  text-align: center;
  margin-bottom: 16px;
  letter-spacing: .05em;
}

.day-wrap { display:flex; gap:12px; margin-bottom:6px; }
.day-line-col {
  display:flex; flex-direction:column; align-items:center;
  width:44px; flex-shrink:0;
}
.day-badge {
  width:44px; height:44px; border-radius:50%;
  background: linear-gradient(135deg,#e06b2a,#b03a18);
  color:#fff; font-size:.7em; font-weight:800;
  display:flex; align-items:center; justify-content:center;
  box-shadow: 0 3px 8px rgba(176,58,24,.4);
  flex-shrink:0; z-index:1;
}
.day-connector {
  flex:1; width:3px;
  background: linear-gradient(180deg,#e06b2a,#b03a18);
  margin-bottom:6px; min-height:18px;
}

.day-card {
  flex:1;
  background:#fff;
  border-radius:12px;
  border-left:4px solid #e06b2a;
  padding:13px 15px;
  margin-bottom:18px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}
.day-card h3 { font-size:.9em; font-weight:800; color:#b03a18; margin-bottom:10px; line-height:1.4; }

.spots-row {
  display:flex; flex-wrap:wrap; gap:10px; align-items:flex-start;
}

/* spot illustration block */
.spot {
  display:flex; flex-direction:column; align-items:center; text-align:center; gap:4px;
}
.spot svg { border-radius:9px; box-shadow:0 2px 7px rgba(0,0,0,.12); }
.spot-name { font-size:.7em; font-weight:800; color:#2e1f0e; max-width:72px; line-height:1.25; }
.spot-time { font-size:.62em; color:#888; max-width:72px; }

/* transport badge */
.tr-badge {
  align-self:center;
  display:inline-flex; align-items:center; gap:3px;
  background:#fff8f0; border:1.5px solid #e06b2a; border-radius:20px;
  padding:4px 10px; font-size:.69em; color:#b03a18; font-weight:700;
}

.note {
  margin-top:9px;
  background:#fff8f0; border-radius:8px;
  padding:7px 11px; font-size:.76em; color:#5a3a18;
  border-left:3px solid #f0a030; line-height:1.65;
}

/* choice box for final day */
.choice-box {
  display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;
}
.choice {
  flex:1; min-width:120px;
  border-radius:10px; padding:8px 10px; font-size:.73em; line-height:1.5;
  border:1.5px solid;
}
.choice.plane  { border-color:#e06b2a; background:#fff5ee; color:#b03a18; }
.choice.train  { border-color:#3a7fc1; background:#eef4fb; color:#1a4a8a; }
.choice b { display:block; font-size:1.05em; margin-bottom:2px; }

/* ── FOOTER ── */
footer {
  text-align:center; padding:16px; font-size:.75em; color:#998870;
  border-top:1px solid #e8d8c0; margin-top:8px;
}

/* Responsive */
@media (max-width: 700px) {
  .main { flex-direction: column; }
  .map-col { width:100%; position:static; }
  .timeline-col { padding-left:0; margin-top:20px; }
}
</style>
</head>
